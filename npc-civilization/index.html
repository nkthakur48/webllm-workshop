<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC Civilization — WebLLM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }
  #game-container { flex: 1; display: flex; align-items: center; justify-content: center; }
  #game-container canvas { border-radius: 8px; }
  #sidebar { width: 360px; background: #16213e; display: flex; flex-direction: column; border-left: 2px solid #0f3460; }
  #status-bar { padding: 12px 16px; background: #0f3460; font-size: 14px; text-align: center; }
  #status-bar .model { color: #e94560; font-weight: bold; }
  #controls { padding: 8px 16px; display: flex; gap: 8px; background: #0f3460; border-top: 1px solid #1a1a2e; }
  #controls button { flex: 1; padding: 8px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; }
  #controls button:hover { background: #c73650; }
  #controls button:disabled { opacity: 0.4; cursor: default; }
  #npc-stats { padding: 12px 16px; overflow-y: auto; flex: 0 0 auto; max-height: 45%; }
  .npc-card { margin-bottom: 10px; padding: 8px 10px; background: #1a1a2e; border-radius: 6px; border-left: 3px solid #555; font-size: 12px; line-height: 1.5; }
  .npc-card.thinking { border-color: #ffd700 !important; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
  .npc-card .name { font-weight: bold; font-size: 13px; }
  .npc-card .stat { color: #aaa; }
  .npc-card .thought { color: #7ec8e3; font-style: italic; margin-top: 4px; }
  #event-log { flex: 1; overflow-y: auto; padding: 12px 16px; border-top: 1px solid #0f3460; font-size: 12px; line-height: 1.6; }
  #event-log .entry { margin-bottom: 4px; padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
  #event-log .entry .turn { color: #666; }
  #event-log .entry .speaker { font-weight: bold; }
  #event-log .entry .speech { color: #ffd700; }

  #loading-overlay {
    position: fixed; inset: 0; background: #1a1a2e; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  #loading-overlay h1 { font-size: 28px; color: #e94560; margin-bottom: 8px; }
  #loading-overlay .sub { color: #7ec8e3; margin-bottom: 30px; font-size: 14px; }
  #progress-bar { width: 400px; height: 20px; background: #16213e; border-radius: 10px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #e94560, #7ec8e3); transition: width 0.3s; }
  #progress-text { margin-top: 12px; font-size: 13px; color: #aaa; text-align: center; max-width: 500px; }
</style>
</head>
<body>

<div id="loading-overlay">
  <h1>NPC Civilization</h1>
  <div class="sub">Powered by Gemma 2B running in your browser via WebLLM</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">Initializing WebLLM engine...</div>
</div>

<div id="game-container"></div>
<div id="sidebar">
  <div id="status-bar">
    <span class="model">gemma-2-2b</span> · Turn <span id="turn-num">0</span> · <span id="sim-status">Waiting</span>
  </div>
  <div id="controls">
    <button id="btn-step" disabled>Next Turn</button>
    <button id="btn-auto" disabled>Auto Play</button>
    <button id="btn-speed">Speed: Normal</button>
  </div>
  <div id="npc-stats"></div>
  <div id="event-log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
